# 1. 環境變數與硬體優化 (最優先讀取，確保 NVIDIA 正常運作)
source = ~/.config/hypr/conf.d/env.conf
source = ~/.config/hypr/conf.d/nvidia.conf

# 2. 硬體與權限設定
source = ~/.config/hypr/conf.d/monitors.conf
source = ~/.config/hypr/conf.d/permissions.conf

# 3. 個人化程式定義與自動啟動
source = ~/.config/hypr/conf.d/userprefs.conf
source = ~/.config/hypr/conf.d/autostart.conf

# 4. 視覺樣式與動畫 (HyDE 的核心美化)
source = ~/.config/hypr/conf.d/themes.conf

# 5. 操作邏輯與輸入設定
source = ~/.config/hypr/conf.d/input.conf
source = ~/.config/hypr/conf.d/keybindings.conf

# 6. 視窗與工作區規則 (Layout 邏輯)
source = ~/.config/hypr/conf.d/windowrules.conf
source = ~/.config/hypr/conf.d/workspaces.conf
source = ~/.config/hypr/conf.d/misc.conf

# ----------------------------------------------------- 
# 提示：如果未來想暫時測試原生的動畫或規則
# 只需要在上面對應的 source 前面加個 # 號註解掉即可
# -----------------------------------------------------
