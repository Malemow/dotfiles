exec-once = fcitx5 -d
exec-once = xsettingsd -c ~/.config/xsettingsd/xsettingsd.conf

exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

exec-once = pypr

# Wallpaper Engine

exec-once = linux-wallpaperengine ~/WallpaperContent/2219165466 --screen-root DP-3 --silent --assets-dir ~/WallpaperEngine/assets
exec-once = linux-wallpaperengine ~/WallpaperContent/3519110968 --screen-root DP-4 --silent --assets-dir ~/WallpaperEngine/assets 
exec-once = linux-wallpaperengine ~/WallpaperContent/2227391573 --screen-root HDMI-A-1  --silent --assets-dir ~/WallpaperEngine/assets 

exec-once = caelestia shell -d
