# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# 基礎操作
bind = $mainMod, T, exec, $terminal # 開啟終端機 (Kitty)
bind = $mainMod, Q, killactive, # 關閉目前視窗
bind = $mainMod, Delete, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit # 登出/關機選單
bind = $mainMod, E, exec, $fileManager # 開啟檔案管理員 (Dolphin)
bind = $mainMod, C, exec, $terminal -e $editor # 開啟文字編輯器
bind = $mainMod, W, togglefloating, # 切換浮動/平鋪模式
bind = $mainMod, SPACE, exec, pkill -x rofi || rofi -show drun # 開啟應用程式選單
bind = $mainMod, J, layoutmsg, togglesplit # 切換分割方向 (Dwindle)
bind = $mainMod, G, togglegroup, # 切換視窗群組化
bind = $mainMod SHIFT, G, moveoutofgroup, # 將目前視窗移出群組
bind = $mainMod CTRL, H, changegroupactive, b # 切換到上一個群組視窗
bind = $mainMod CTRL, L, changegroupactive, f # 切換到下一個群組視窗
bind = $mainMod ALT, left, moveintogroup, l # 將視窗移入左側群組
bind = $mainMod ALT, right, moveintogroup, r # 將視窗移入右側群組
bind = $mainMod ALT, up, moveintogroup, u # 將視窗移入上方群組
bind = $mainMod ALT, down, moveintogroup, d # 將視窗移入下方群組
bind = $mainMod SHIFT, F, pin, # 固定視窗 (置頂)
bind = $mainMod, B, exec, $browser # 開啟瀏覽器
bind = $mainMod, TAB, exec, rofi -show window # 切換已開啟的視窗
bind = Alt, Tab, exec, hyprctl --batch "dispatch cyclenext ; dispatch alterzorder top" # 循環切換視窗
bind = $mainMod, A, fullscreen # 切換全螢幕
bind = CTRL SHIFT, Escape, exec, $terminal --class btop-float -e btop # 開啟系統監控 (Btop)

# 移動焦點
bind = $mainMod, left, movefocus, l # 焦點移向左側
bind = $mainMod, right, movefocus, r # 焦點移向右側
bind = $mainMod, up, movefocus, u # 焦點移向上方
bind = $mainMod, down, movefocus, d # 焦點移向下方

# 縮放視窗
binde = $mainMod SHIFT, right, resizeactive, 30 0 # 增加視窗寬度
binde = $mainMod SHIFT, left, resizeactive, -30 0 # 減少視窗寬度
binde = $mainMod SHIFT, up, resizeactive, 0 -30 # 減少視窗高度
binde = $mainMod SHIFT, down, resizeactive, 0 30 # 增加視窗高度

# 智慧移動視窗（浮動用像素，平鋪跟旁邊交換）
$moveactivewindow = grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive
binde = $mainMod SHIFT CTRL, left, exec, $moveactivewindow -30 0 || hyprctl dispatch movewindow l # 向左移動視窗
binde = $mainMod SHIFT CTRL, right, exec, $moveactivewindow 30 0 || hyprctl dispatch movewindow r # 向右移動視窗
binde = $mainMod SHIFT CTRL, up, exec, $moveactivewindow 0 -30 || hyprctl dispatch movewindow u # 向上移動視窗
binde = $mainMod SHIFT CTRL, down, exec, $moveactivewindow 0 30 || hyprctl dispatch movewindow d # 向下移動視窗

# 工作區切換 [0-9]
bind = $mainMod, 1, workspace, 1 # 切換至工作區 1
bind = $mainMod, 2, workspace, 2 # 切換至工作區 2
bind = $mainMod, 3, workspace, 3 # 切換至工作區 3
bind = $mainMod, 4, workspace, 4 # 切換至工作區 4
bind = $mainMod, 5, workspace, 5 # 切換至工作區 5
bind = $mainMod, 6, workspace, 6 # 切換至工作區 6
bind = $mainMod, 7, workspace, 7 # 切換至工作區 7
bind = $mainMod, 8, workspace, 8 # 切換至工作區 8
bind = $mainMod, 9, workspace, 9 # 切換至工作區 9
bind = $mainMod, 0, workspace, 10 # 切換至工作區 10

# 相對工作區切換
bind = $mainMod CTRL, right, workspace, r+1 # 切換至右側工作區
bind = $mainMod CTRL, left, workspace, r-1 # 切換至左側工作區
bind = $mainMod CTRL, down, workspace, empty # 切換至空白工作區

# 移動視窗到工作區 [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1 # 移動視窗至工作區 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2 # 移動視窗至工作區 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3 # 移動視窗至工作區 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4 # 移動視窗至工作區 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5 # 移動視窗至工作區 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6 # 移動視窗至工作區 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7 # 移動視窗至工作區 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8 # 移動視窗至工作區 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9 # 移動視窗至工作區 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10 # 移動視窗至工作區 10

# 視窗移到相對工作區
bind = $mainMod CTRL ALT, right, movetoworkspace, r+1 # 視窗移至右側工作區
bind = $mainMod CTRL ALT, left, movetoworkspace, r-1 # 視窗移至左側工作區

# 靜默移動視窗 (畫面不跟隨)
bind = $mainMod ALT, 1, movetoworkspacesilent, 1 # 靜默移動至工作區 1
bind = $mainMod ALT, 2, movetoworkspacesilent, 2 # 靜默移動至工作區 2
bind = $mainMod ALT, 3, movetoworkspacesilent, 3 # 靜默移動至工作區 3
bind = $mainMod ALT, 4, movetoworkspacesilent, 4 # 靜默移動至工作區 4
bind = $mainMod ALT, 5, movetoworkspacesilent, 5 # 靜默移動至工作區 5
bind = $mainMod ALT, 6, movetoworkspacesilent, 6 # 靜默移動至工作區 6
bind = $mainMod ALT, 7, movetoworkspacesilent, 7 # 靜默移動至工作區 7
bind = $mainMod ALT, 8, movetoworkspacesilent, 8 # 靜默移動至工作區 8
bind = $mainMod ALT, 9, movetoworkspacesilent, 9 # 靜默移動至工作區 9
bind = $mainMod ALT, 0, movetoworkspacesilent, 10 # 靜默移動至工作區 10

# 特殊工作區 (Magic Scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic # 顯示/隱藏特殊工作區
bind = $mainMod SHIFT, S, movetoworkspace, special:magic # 移動視窗至特殊工作區
bind = $mainMod ALT, S, movetoworkspacesilent, special:magic # 靜默移動至特殊工作區

# 滾輪切換工作區
bind = $mainMod, mouse_down, workspace, e+1 # 切換至下一個工作區
bind = $mainMod, mouse_up, workspace, e-1 # 切換至上一個工作區

# 滑鼠操作
bindm = $mainMod, mouse:272, movewindow # 拖曳移動視窗
bindm = $mainMod, mouse:273, resizewindow # 拖曳縮放視窗

# 多媒體鍵
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ # 調高音量
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- # 調低音量
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle # 切換靜音
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle # 切換麥克風靜音
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ # 提高螢幕亮度
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- # 降低螢幕亮度

# 音樂播放控制
bindl = , XF86AudioNext, exec, playerctl next # 下一首
bindl = , XF86AudioPause, exec, playerctl play-pause # 暫停/播放
bindl = , XF86AudioPlay, exec, playerctl play-pause # 暫停/播放
bindl = , XF86AudioPrev, exec, playerctl previous # 上一首

# 其他快捷鍵
bind = CTRL SHIFT, SPACE, exec, 1password --quick-access # 1Password 快速存取
bind = $mainMod, L, exec, hyprlock # 鎖定螢幕

# 截圖功能
bind = , Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png # 全螢幕截圖
bind = $mainMod, P, exec, grim -g "$(slurp)" - | satty --filename - --output-filename ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png # 選項截圖並編輯 (Satty)
bind = $mainMod SHIFT, X, exec, hyprpicker -an # 螢幕點滴 (取色器)
bind = $mainMod SHIFT, P, exec, grim -g "$(slurp)" - | wl-copy # 選取區域並複製到剪貼簿

# 剪貼簿歷史
bind = $mainMod, V, exec, pkill -x rofi || cliphist list | rofi -dmenu -theme ~/.config/rofi/clipboard.rasi -p "Clipboard" | cliphist decode | wl-copy # 開啟剪貼簿歷史

# 終端機工具
bind = $mainMod, grave, exec, pypr toggle console # 顯示/隱藏下拉式終端機
bind = $mainMod SHIFT, slash, exec, ~/.config/waybar/keybinds_rofi.sh # 顯示快捷鍵清單 (Rofi)

# Rofi 選單
bind = $mainMod SHIFT, SPACE, exec, pkill -x rofi || rofi -show drun -theme ~/.config/rofi/quickapps.rasi # 開啟常用軟體選單
bind = $mainMod SHIFT, period, exec, pkill -x rofi || rofi -show emoji -theme ~/.config/rofi/config.rasi # 開啟表情符號選單
