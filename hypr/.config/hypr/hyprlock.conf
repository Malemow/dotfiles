general {
    hide_cursor = true
    ignore_empty_input = true
    fractional_scaling = 2
}

background {
    monitor =
    path = screenshot # 使用目前螢幕截圖
    blur_passes = 3   # 高品質模糊
    blur_size = 7
    brightness = 0.5  # 稍微調暗，讓前景更清晰
}

# 時間 (大字體，居中)
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.9)
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 160
    halign = center
    valign = center
}

# 日期 (簡潔，居中)
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B")"
    color = rgba(255, 255, 255, 0.7)
    font_size = 24
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 70
    halign = center
    valign = center
}

# 頭像 (圓形)
image {
    monitor =
    path = $HOME/.face.icon # 如果沒有此檔案，Hyprlock 會顯示預設圖示
    size = 120
    rounding = -1 # 完美圓形
    border_size = 2
    border_color = rgba(255, 255, 255, 0.2)
    position = 0, -40
    halign = center
    valign = center
}

# 使用者名稱
label {
    monitor =
    text = $USER
    color = rgba(255, 255, 255, 0.8)
    font_size = 20
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -120
    halign = center
    valign = center
}

# 輸入密碼框 (膠囊造型)
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 0 # 移除邊框
    dots_size = 0.2
    dots_spacing = 0.4
    dots_center = true
    inner_color = rgba(255, 255, 255, 0.1) # 極簡半透明填充
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = false
    placeholder_text = <i><span foreground="##ffffff66">Enter Password</span></i>
    hide_input = false
    rounding = 25 # 圓角膠囊感
    check_color = rgba(255, 255, 255, 0.2)
    fail_color = rgba(255, 85, 85, 0.4)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -180
    halign = center
    valign = center
}


