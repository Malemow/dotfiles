legacy_layout=false

# --- NVIDIA RTX 4060 (獨顯) ---
# 確保抓取獨顯數據
pci_dev=0000:01:00.0
gpu_stats
gpu_temp
gpu_core_clock
gpu_mem_clock
gpu_power
gpu_load_change
gpu_text=RTX 4060
gpu_color=2e9762

# --- CPU: i5-13400 ---
cpu_stats
cpu_temp
cpu_power
cpu_mhz
cpu_color=2e97cb
cpu_text=i5-13400

# --- 記憶體與顯存 (這裡會顯示所有 GPU 的 VRAM) ---
vram
vram_color=ad64c1
ram
ram_color=c26693

# --- 遊戲效能 ---
fps
vulkan_driver
frame_timing=1
frametime_color=00ff00
gamemode
time

# --- 介面外觀 ---
table_columns=3
background_alpha=0.6
background_color=020202
font_size=14
position=top-left
text_color=ffffff
round_corners=10

# --- 功能鍵 ---
toggle_hud=Shift_R+F12
toggle_fps_limit=F1
toggle_logging=Shift_L+F2
output_folder=$HOME
