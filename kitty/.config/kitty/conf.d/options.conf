# 字體設定
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.0

# 游標動畫設定
cursor_blink_interval      -1
cursor_stop_blinking_after 15.0

# 游標平滑移動 (這是你想要的動畫效果)
cursor_trail 1
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# 游標形狀（如果你喜歡 iTerm2 的那種動畫，建議用 block 或 beam）
cursor_shape block
shell_integration enabled

# 移除標題列（Hyprland 會處理邊框，這樣最乾淨）
hide_window_decorations yes

# 視窗邊距（讓文字不要貼死邊邊，看 code 比較舒服）
window_padding_width 10

# 關閉惱人的警報音
enable_audio_bell no

# 當你切換視窗時，滑鼠自動隱藏
mouse_hide_wait 3.0

# 增加滾動緩衝區（預設太小，調到 10000 行方便回頭查噴錯的 Log）
scrollback_lines 10000

# 滾動感應速度
wheel_scroll_multiplier 5.0

# 效能設定（針對 144Hz 或高刷螢幕優化，減少輸入延遲）
repaint_delay    8
input_delay      3
sync_to_monitor  yes

# 設定游標形狀為方塊，且不閃爍（這看個人喜好，我推薦不閃爍比較專注）
cursor_blink_interval 0
cursor_shape block

# 偵測網址，按住 Ctrl + 左鍵可以開啟
url_style curly
open_url_with default
detect_urls yes

# Tab bar
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
