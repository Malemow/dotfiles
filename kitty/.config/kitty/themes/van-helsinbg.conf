# 字體設定 (使用你剛下載的 JetBrains Mono)
font_family      JetBrainsMono Nerd Font
font_size        12.0
bold_font        auto
italic_font      auto
bold_italic_font auto

# 核心配色 - Van Helsing 特色：極深背景
background            #0b0d0f
foreground            #f8f8f2
cursor                #708ca9
cursor_text_color     #f8f8f2
selection_background  #414d58
selection_foreground  #c6c6c2

# ANSI 顏色序列
# Black (Normal/Bright)
color0 #0b0d0f
color8 #364049

# Red (Normal/Bright)
color1 #ff9580
color9 #ffaa99

# Green (Normal/Bright)
color2 #8aff8a
color10 #a2ffa2

# Yellow (Normal/Bright)
color3 #ffff80
color11 #ffffa2

# Blue (Normal/Bright)
color4 #9580ff
color12 #aa99ff

# Magenta (Normal/Bright)
color5 #ff80bf
color13 #ff99cc

# Cyan (Normal/Bright)
color6 #80ffea
color14 #99ffee

# White (Normal/Bright)
color7 #f8f8f2
color15 #ffffff

# 其他調整
url_color #80ffea
active_tab_foreground   #0b0d0f
active_tab_background   #f8f8f2
inactive_tab_foreground #f8f8f2
inactive_tab_background #364049
